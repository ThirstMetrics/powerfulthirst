<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="riverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#faf9fc"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#503AA8" letter-spacing="0.5">Douro Valley Sub-Regions</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#888" letter-spacing="0.3">World's Oldest Demarcated Wine Region (est. 1756)</text>

  <!-- Atlantic Ocean indicator -->
  <rect x="18" y="130" width="70" height="160" rx="8" fill="#d6eaf8" stroke="#aed6f1" stroke-width="1"/>
  <text x="53" y="200" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="600">Atlantic</text>
  <text x="53" y="214" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="600">Ocean</text>
  <!-- Wave lines -->
  <path d="M30,230 Q40,225 50,230 Q60,235 70,230" fill="none" stroke="#85c1e9" stroke-width="1.2"/>
  <path d="M30,238 Q40,233 50,238 Q60,243 70,238" fill="none" stroke="#85c1e9" stroke-width="1.2"/>

  <!-- Porto city marker -->
  <circle cx="120" cy="210" r="7" fill="#503AA8" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#503AA8">Porto</text>
  <text x="120" y="240" text-anchor="middle" font-size="9" fill="#666">(Vila Nova de Gaia)</text>

  <!-- Spain indicator -->
  <rect x="815" y="130" width="70" height="160" rx="8" fill="#fdebd0" stroke="#f0c987" stroke-width="1"/>
  <text x="850" y="210" text-anchor="middle" font-size="11" fill="#b07d2e" font-weight="600">Spain</text>

  <!-- Douro River - flowing west to Porto -->
  <path d="M120,210 C180,210 200,195 260,200 C320,205 340,215 410,208 C480,200 510,220 580,212 C650,204 680,218 740,210 C780,205 810,210 850,208"
        fill="none" stroke="url(#riverGrad)" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- River label -->
  <text x="450" y="252" text-anchor="middle" font-size="11" fill="#2471a3" font-style="italic" font-weight="500">Rio Douro</text>
  <!-- Flow arrow -->
  <polygon points="130,210 145,204 145,216" fill="#2980b9" opacity="0.7"/>
  <text x="155" y="270" text-anchor="middle" font-size="9" fill="#2980b9">&#x2190; flow to Atlantic</text>

  <!-- SUB-REGION 1: Baixo Corgo (westernmost, closest to Porto) -->
  <rect x="160" y="90" width="190" height="100" rx="10" fill="#503AA8" fill-opacity="0.12" stroke="#503AA8" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#503AA8">Baixo Corgo</text>
  <line x1="215" y1="125" x2="295" y2="125" stroke="#FFEE58" stroke-width="2.5" stroke-linecap="round"/>
  <text x="255" y="142" text-anchor="middle" font-size="10" fill="#555">Wettest &amp; coolest sub-region</text>
  <text x="255" y="156" text-anchor="middle" font-size="10" fill="#555">Highest vineyard density</text>
  <text x="255" y="170" text-anchor="middle" font-size="10" fill="#555">Lighter, aromatic wines</text>
  <text x="255" y="184" text-anchor="middle" font-size="9" fill="#888">~800mm rainfall/yr</text>

  <!-- SUB-REGION 2: Cima Corgo (center, the heart) -->
  <rect x="370" y="90" width="190" height="100" rx="10" fill="#503AA8" fill-opacity="0.22" stroke="#503AA8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="465" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#503AA8">Cima Corgo</text>
  <line x1="420" y1="125" x2="510" y2="125" stroke="#FFEE58" stroke-width="2.5" stroke-linecap="round"/>
  <text x="465" y="142" text-anchor="middle" font-size="10" fill="#555">Heart of Port production</text>
  <text x="465" y="156" text-anchor="middle" font-size="10" fill="#555">Home to top quintas</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#555">Concentrated, structured wines</text>
  <text x="465" y="184" text-anchor="middle" font-size="9" fill="#888">~600mm rainfall/yr</text>
  <!-- Star marker for premium region -->
  <text x="375" y="105" font-size="14" fill="#FFEE58">&#9733;</text>

  <!-- SUB-REGION 3: Douro Superior (easternmost, towards Spain) -->
  <rect x="580" y="90" width="210" height="100" rx="10" fill="#503AA8" fill-opacity="0.08" stroke="#503AA8" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="685" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#503AA8">Douro Superior</text>
  <line x1="630" y1="125" x2="740" y2="125" stroke="#FFEE58" stroke-width="2.5" stroke-linecap="round"/>
  <text x="685" y="142" text-anchor="middle" font-size="10" fill="#555">Hottest &amp; driest sub-region</text>
  <text x="685" y="156" text-anchor="middle" font-size="10" fill="#555">Largest area, least planted</text>
  <text x="685" y="170" text-anchor="middle" font-size="10" fill="#555">Bold, ripe fruit character</text>
  <text x="685" y="184" text-anchor="middle" font-size="9" fill="#888">~400mm rainfall/yr</text>

  <!-- Terraced hillside indicators -->
  <!-- Left bank terraces -->
  <g opacity="0.35" stroke="#503AA8" stroke-width="0.8" fill="none">
    <path d="M175,290 Q210,280 245,290"/>
    <path d="M180,298 Q210,288 240,298"/>
    <path d="M185,306 Q210,296 235,306"/>
    <path d="M390,290 Q425,278 460,290"/>
    <path d="M395,298 Q425,286 455,298"/>
    <path d="M400,306 Q425,294 450,306"/>
    <path d="M600,290 Q640,278 680,290"/>
    <path d="M605,298 Q640,286 675,298"/>
    <path d="M610,306 Q640,294 670,306"/>
  </g>
  <text x="255" y="322" text-anchor="middle" font-size="8" fill="#999">terraced vineyards</text>
  <text x="465" y="322" text-anchor="middle" font-size="8" fill="#999">terraced vineyards</text>
  <text x="685" y="322" text-anchor="middle" font-size="8" fill="#999">terraced vineyards</text>

  <!-- Key quintas markers -->
  <g font-size="9" fill="#503AA8">
    <circle cx="430" cy="205" r="3" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
    <text x="430" y="220" text-anchor="middle" font-weight="600">Q. do Noval</text>
    <circle cx="500" cy="202" r="3" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
    <text x="500" y="220" text-anchor="middle" font-weight="600">Taylor's</text>
    <circle cx="340" cy="205" r="3" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
    <text x="340" y="220" text-anchor="middle" font-weight="600">Graham's</text>
  </g>

  <!-- Legend -->
  <rect x="30" y="345" width="840" height="58" rx="8" fill="#f4f2fa" stroke="#e0dce8" stroke-width="1"/>
  <text x="50" y="366" font-size="11" font-weight="700" fill="#503AA8">Legend:</text>
  <circle cx="130" cy="362" r="4" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
  <text x="140" y="366" font-size="10" fill="#555">Notable Quinta</text>
  <line x1="220" y1="362" x2="250" y2="362" stroke="url(#riverGrad)" stroke-width="4" stroke-linecap="round"/>
  <text x="258" y="366" font-size="10" fill="#555">Douro River</text>
  <rect x="340" y="355" width="16" height="12" rx="3" fill="#503AA8" fill-opacity="0.22" stroke="#503AA8" stroke-width="1.5"/>
  <text x="362" y="366" font-size="10" fill="#555">Premium zone (darker = higher concentration)</text>
  <text x="50" y="390" font-size="9" fill="#999" font-style="italic">Direction: West (Porto / Atlantic) &#x2190;&#x2192; East (Spain) | Rainfall decreases &amp; temperature increases eastward</text>

  <!-- Branding -->
  <text x="880" y="412" text-anchor="end" font-size="8" fill="#bbb" letter-spacing="0.5">PowerfulThirst.com | Thirst Academy</text>
</svg>
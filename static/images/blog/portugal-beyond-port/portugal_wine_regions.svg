<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="500" height="750">
  <defs>
    <style>
      .region-label { font-family: 'Georgia', serif; font-size: 13px; fill: #2d2d2d; font-weight: bold; }
      .region-sublabel { font-family: 'Helvetica Neue', sans-serif; font-size: 10px; fill: #555; }
      .title-text { font-family: 'Georgia', serif; font-size: 18px; fill: #503AA8; font-weight: bold; }
      .ocean-label { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; fill: #7a9cc6; font-style: italic; }
      .legend-text { font-family: 'Helvetica Neue', sans-serif; font-size: 10px; fill: #333; }
      .border-line { stroke: #503AA8; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; }
      .connector { stroke: #888; stroke-width: 1; fill: none; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="750" fill="#f5f2eb" rx="8"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" class="title-text">Portugal Wine Regions</text>
  <line x1="140" y1="42" x2="360" y2="42" stroke="#FFEE58" stroke-width="2"/>

  <!-- Ocean -->
  <rect x="0" y="50" width="130" height="620" fill="#d6e8f5" rx="0" opacity="0.5"/>
  <text x="60" y="370" text-anchor="middle" class="ocean-label" transform="rotate(-90 60 370)">Atlantic Ocean</text>

  <!-- Spain label -->
  <text x="420" y="200" text-anchor="middle" class="ocean-label" style="fill:#aaa; font-size:14px;" transform="rotate(90 420 200)">Spain</text>

  <!-- Portugal mainland outline (simplified) -->
  <path d="
    M 190,65
    L 320,65
    L 350,80
    L 370,100
    L 380,130
    L 370,160
    L 360,180
    L 375,210
    L 370,250
    L 355,280
    L 365,310
    L 370,350
    L 360,390
    L 350,420
    L 340,450
    L 320,480
    L 300,510
    L 280,530
    L 260,550
    L 240,560
    L 210,570
    L 180,560
    L 160,540
    L 140,510
    L 130,470
    L 125,430
    L 130,390
    L 135,350
    L 140,310
    L 145,270
    L 150,230
    L 155,200
    L 160,170
    L 165,140
    L 170,110
    L 180,85
    Z
  " fill="#e8e0d0" stroke="#503AA8" stroke-width="2" filter="url(#shadow)"/>

  <!-- Vinho Verde region (north) -->
  <path d="
    M 190,70
    L 320,70
    L 345,82
    L 360,100
    L 370,130
    L 360,155
    L 340,155
    L 300,160
    L 260,165
    L 220,160
    L 190,150
    L 172,130
    L 170,110
    L 180,85
    Z
  " fill="#503AA8" opacity="0.7" stroke="#503AA8" stroke-width="1"/>

  <!-- Dao region (center) -->
  <path d="
    M 260,165
    L 340,155
    L 360,175
    L 370,210
    L 365,240
    L 340,250
    L 300,255
    L 265,250
    L 240,240
    L 230,220
    L 235,195
    L 245,175
    Z
  " fill="#7b5ec7" opacity="0.7" stroke="#503AA8" stroke-width="1"/>

  <!-- Alentejo region (south) -->
  <path d="
    M 200,380
    L 260,350
    L 320,350
    L 360,370
    L 355,400
    L 345,440
    L 330,470
    L 310,500
    L 280,520
    L 250,540
    L 220,550
    L 190,545
    L 165,525
    L 145,500
    L 135,460
    L 135,420
    L 145,395
    L 165,385
    Z
  " fill="#FFEE58" opacity="0.6" stroke="#503AA8" stroke-width="1"/>

  <!-- Madeira island (inset box) -->
  <rect x="30" y="600" width="170" height="110" fill="#f5f2eb" stroke="#503AA8" stroke-width="1.5" rx="6"/>
  <text x="115" y="618" text-anchor="middle" class="region-sublabel" style="font-style: italic;">~ 1,000 km SW</text>

  <!-- Madeira island shape -->
  <ellipse cx="115" cy="665" rx="55" ry="22" fill="#c4a0e8" stroke="#503AA8" stroke-width="1.5" opacity="0.8"/>
  <!-- Terracing lines on Madeira -->
  <path d="M 75,660 Q 115,650 155,660" fill="none" stroke="#503AA8" stroke-width="0.5" opacity="0.5"/>
  <path d="M 80,668 Q 115,658 150,668" fill="none" stroke="#503AA8" stroke-width="0.5" opacity="0.5"/>
  <path d="M 85,676 Q 115,666 145,676" fill="none" stroke="#503AA8" stroke-width="0.5" opacity="0.5"/>

  <!-- Madeira label -->
  <text x="115" y="700" text-anchor="middle" class="region-label" style="fill: #503AA8;">Madeira</text>

  <!-- Region labels with connectors -->

  <!-- Vinho Verde label -->
  <circle cx="270" cy="115" r="3" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
  <line x1="273" y1="113" x2="395" y2="90" class="connector"/>
  <rect x="380" y="72" width="110" height="36" fill="white" stroke="#503AA8" stroke-width="0.5" rx="4" opacity="0.9"/>
  <text x="435" y="88" text-anchor="middle" class="region-label" style="fill: #503AA8;">Vinho Verde</text>
  <text x="435" y="100" text-anchor="middle" class="region-sublabel">Minho / NW Portugal</text>

  <!-- Dao label -->
  <circle cx="300" cy="210" r="3" fill="#FFEE58" stroke="#503AA8" stroke-width="1"/>
  <line x1="303" y1="208" x2="400" y2="185" class="connector"/>
  <rect x="388" y="168" width="105" height="36" fill="white" stroke="#503AA8" stroke-width="0.5" rx="4" opacity="0.9"/>
  <text x="440" y="184" text-anchor="middle" class="region-label" style="fill: #503AA8;">D&#xe3;o</text>
  <text x="440" y="196" text-anchor="middle" class="region-sublabel">Granite / Continental</text>

  <!-- Alentejo label -->
  <circle cx="250" cy="450" r="3" fill="#503AA8" stroke="#FFEE58" stroke-width="1.5"/>
  <line x1="253" y1="448" x2="390" y2="435" class="connector"/>
  <rect x="378" y="420" width="115" height="36" fill="white" stroke="#503AA8" stroke-width="0.5" rx="4" opacity="0.9"/>
  <text x="435" y="436" text-anchor="middle" class="region-label" style="fill: #503AA8;">Alentejo</text>
  <text x="435" y="448" text-anchor="middle" class="region-sublabel">Southern Plains / Warm</text>

  <!-- Lisbon dot -->
  <circle cx="155" cy="330" r="4" fill="#333" stroke="white" stroke-width="1"/>
  <text x="145" y="348" text-anchor="middle" class="region-sublabel" style="font-weight:bold; fill:#333;">Lisbon</text>

  <!-- Porto dot -->
  <circle cx="175" cy="125" r="4" fill="#333" stroke="white" stroke-width="1"/>
  <text x="175" y="118" text-anchor="middle" class="region-sublabel" style="font-weight:bold; fill:#333;">Porto</text>

  <!-- Legend -->
  <rect x="250" y="580" width="230" height="130" fill="white" stroke="#503AA8" stroke-width="1" rx="6" opacity="0.9"/>
  <text x="365" y="600" text-anchor="middle" class="region-label" style="font-size:12px;">Legend</text>
  <line x1="270" y1="605" x2="460" y2="605" stroke="#ddd" stroke-width="0.5"/>

  <rect x="270" y="615" width="18" height="12" fill="#503AA8" opacity="0.7" rx="2"/>
  <text x="296" y="625" class="legend-text">Vinho Verde</text>

  <rect x="270" y="635" width="18" height="12" fill="#7b5ec7" opacity="0.7" rx="2"/>
  <text x="296" y="645" class="legend-text">D&#xe3;o</text>

  <rect x="270" y="655" width="18" height="12" fill="#FFEE58" opacity="0.6" rx="2"/>
  <text x="296" y="665" class="legend-text">Alentejo</text>

  <rect x="270" y="675" width="18" height="12" fill="#c4a0e8" opacity="0.8" rx="2"/>
  <text x="296" y="685" class="legend-text">Madeira (island)</text>

  <!-- Attribution -->
  <text x="250" y="738" text-anchor="middle" class="region-sublabel" style="font-size:8px; fill:#999;">PowerfulThirst.com | Thirst Academy | Illustrative, not to scale</text>
</svg>